const DAYS = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const DAY_SHORT = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];

function getTodayKey() {
  const map = [6,0,1,2,3,4,5];
  return DAYS[map[new Date().getDay()]];
}

function getStorageKey(profile, type) {
  return `perf_${profile}_${type}_${new Date().toISOString().split('T')[0]}`;
}

function ProfileSwitch({ active, onChange }) {
  return (
    <div className="flex items-center justify-center gap-2 p-1 bg-slate-800 rounded-2xl">
      {["fabio","thais"].map(p => (
        <button key={p} onClick={() => onChange(p)}
          className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${active===p ? (p==="fabio"?"bg-blue-600 text-white shadow-lg":"bg-pink-600 text-white shadow-lg") : "text-slate-400 hover:text-slate-200"}`}>
          <span className="text-base">{DATA[p].avatar}</span>{DATA[p].name}
        </button>
      ))}
    </div>
  );
}

function StatCard({ label, value, color }) {
  return (
    <div className={`rounded-xl border p-3 text-center ${color==="blue"?"border-blue-500/30 bg-blue-950/40":"border-pink-500/30 bg-pink-950/40"}`}>

      <div className="text-sm font-bold text-white">{value}</div>
    </div>
  );
}

        return (
          <button key={day} onClick={() => onSelect(day)}
            className={`flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2.5 rounded-xl border transition-all duration-150 ${isSel?(color==="blue"?"border-blue-500 bg-blue-900/60 text-white":"border-pink-500 bg-pink-900/60 text-white"):isToday?"border-slate-500 bg-slate-700/60 text-slate-200":"border-slate-700 bg-slate-800/40 text-slate-400 hover:border-slate-500"}`}>
            <span className="text-xs font-medium">{DAY_SHORT[i]}</span>
            <span className={`text-lg ${typeColors[s.type]}`}>{s.type==="workout"?"🏋️":s.type==="cardio"?"🏃":"😴"}</span>
            {isToday && <span className="w-1.5 h-1.5 rounded-full bg-green-400"></span>}
          </button>
        );
      })}
    </div>
  );
}

function WorkoutLog({ profile, day }) {
  const p = DATA[profile];
  const sched = p.schedule[day];
  const [checked, setChecked] = useState({});
  const [popAnim, setPopAnim] = useState({});

  useEffect(() => {
    const saved = localStorage.getItem(getStorageKey(profile, `workout_${day}`));
    setChecked(saved ? JSON.parse(saved) : {});
  }, [profile, day]);

  const toggleSet = useCallback((exIdx, setIdx) => {
    const key = `${exIdx}_${setIdx}`;
    setChecked(prev => {
      const next = { ...prev, [key]: !prev[key] };
      localStorage.setItem(getStorageKey(profile, `workout_${day}`), JSON.stringify(next));
      return next;
    });
    setPopAnim(prev => ({ ...prev, [key]: true }));
    setTimeout(() => setPopAnim(prev => ({ ...prev, [key]: false })), 200);
  }, [profile, day]);

  if (!sched.key) {
    return (
      <div className="text-center py-12 fade-in">
        <div className="text-5xl mb-3">{sched.type==="cardio"?"🏃":"😴"}</div>
        <div className="text-white font-semibold text-lg">{sched.label}</div>
        <div className="text-slate-400 text-sm mt-1">{sched.focus}</div>
        {sched.type==="cardio" && (
          <div className="mt-4 mx-auto max-w-xs bg-slate-800 rounded-xl p-4 text-left">
            <div className="text-green-400 font-semibold text-sm mb-2">📋 Protocolo do Dia</div>
            <div className="text-slate-300 text-sm">• Zona 2 — FC 120–140 bpm</div>
            <div className="text-slate-300 text-sm">• {sched.focus}</div>
            <div className="text-slate-300 text-sm">• Ritmo confortável — consegue conversar</div>
          </div>
        )}
      </div>
    );
  }

  const workout = p.workouts[sched.key];
  const totalSets = workout.exercises.reduce((a,e) => a+e.series, 0);
  const doneSets = Object.values(checked).filter(Boolean).length;
  const pct = totalSets > 0 ? Math.round((doneSets/totalSets)*100) : 0;
  const accentBg = p.color==="blue"?"bg-blue-600":"bg-pink-600";
  const accentText = p.color==="blue"?"text-blue-400":"text-pink-400";
  const accentRing = p.color==="blue"?"ring-blue-500":"ring-pink-500";

  return (
    <div className="fade-in space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <div className={`text-sm font-bold ${accentText}`}>{workout.name}</div>
          <div className="text-slate-400 text-xs">{doneSets}/{totalSets} séries concluídas</div>
        </div>
        <div className={`relative w-14 h-14 ring-2 ${accentRing} rounded-full flex items-center justify-center`}>
          <svg className="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 56 56">
            ircle cx="28" cy="28" r="24" stroke="#1e293b" strokeWidth="4" fill="none"/>
            ircle cx="28" cy="28" r="24" stroke={p.accent} strokeWidth="4" fill="none"
              strokeDasharray={`${2*Math.PI*24}`} strokeDashoffset={`${2*Math.PI*24*(1-pct/100)}`}
              strokeLinecap="round" style={{transition:"stroke-dashoffset 0.3s"}}/>
          </svg>
          <span className="text-xs font-bold text-white z-10">{pct}%</span>
        </div>
      </div>
      {workout.exercises.map((ex, exIdx) => {
        const exDone = Array.from({length:ex.series},(_,i)=>checked[`${exIdx}_${i}`]).filter(Boolean).length;
        const isFullDone = exDone===ex.series;
        return (
          <div key={exIdx} className={`rounded-xl border transition-all duration-200 ${isFullDone?"border-green-600/50 bg-green-950/20":"border-slate-700 bg-slate-800/50"}`}>
            <div className="p-3 pb-2">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className={`font-semibold text-sm ${isFullDone?"text-green-400":"text-white"}`}>{isFullDone?"✅ ":""}{ex.name}</div>
                  <div className="text-slate-400 text-xs mt-0.5">{ex.equipment}</div>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-xs text-slate-300 font-medium">{ex.reps} reps</div>
                  <div className="text-xs text-slate-500">⏱ {ex.rest}</div>
                </div>
              </div>
              <div className="mt-2 text-xs text-slate-500 italic">💡 {ex.tip}</div>
            </div>
            <div className="px-3 pb-3">
              <div className="text-xs text-slate-500 mb-1.5">Marcar séries:</div>
              <div className="flex gap-2 flex-wrap">
                {Array.from({length:ex.series},(_,setIdx)=>{
                  const key=`${exIdx}_${setIdx}`;
                  const done=!!checked[key];
                  return (
                    <button key={setIdx} onClick={()=>toggleSet(exIdx,setIdx)}
                      className={`w-9 h-9 rounded-lg text-sm font-bold transition-all duration-150 border ${done?`${accentBg} border-transparent text-white ${popAnim[key]?"check-pop":""}` :"border-slate-600 bg-slate-700/50 text-slate-400 hover:border-slate-400"}`}>
                      {done?"✓":setIdx+1}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })}
      {pct===100 && (
        <div className="text-center py-6 rounded-xl border border-green-500/40 bg-green-950/20">
          <div className="text-4xl mb-2">🎯</div>
          <div className="text-green-400 font-bold">Treino Concluído!</div>
          <div className="text-slate-400 text-sm mt-1">Excelente trabalho hoje 💪</div>
        </div>
      )}
    </div>
  );
}
