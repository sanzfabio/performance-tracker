// ─── Constantes de dias da semana ────────────────────────────────────────────
const DIAS     = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const DIAS_ABR = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];

// Emojis por tipo de atividade
const ICONE_TIPO = { treino:"🏋️ Treino", dieta:"🥗 Dieta", suplementos:"💊 Suplementos", habitos:"📊 Hábitos" };

// Cor de texto por tipo de atividade
const COR_TIPO = { treino: "text-orange-400", cardio: "text-green-400", descanso: "text-slate-400" };

/** Retorna o dia da semana atual no formato usado em DIAS */
function obterDiaHoje() {
  const mapa = [6, 0, 1, 2, 3, 4, 5]; // JS: Dom=0 → nosso índice 6
  return DIAS[mapa[new Date().getDay()]];
}

/** Gera a chave de armazenamento no localStorage para o dia atual */
function gerarChaveStorage(perfil, tipo) {
  return `perf_${perfil}_${tipo}_${new Date().toISOString().split('T')[0]}`;
}

// ─── Componente: Log de Treino ────────────────────────────────────────────────
function LogTreino({ perfil, dia }) {
  const p     = DADOS[perfil];
  const cor   = CORES_PERFIL[perfil];
  const entrada = p.rotina[dia];

  // Estado: séries marcadas e animação de clique
  const [marcados,    setMarcados]    = useState({});
  const [animacoes,   setAnimacoes]   = useState({});

  // Carrega marcações salvas ao trocar perfil ou dia
  useEffect(() => {
    const salvo = localStorage.getItem(gerarChaveStorage(perfil, `treino_${dia}`));
    setMarcados(salvo ? JSON.parse(salvo) : {});
  }, [perfil, dia]);

  /** Alterna a marcação de uma série e persiste no localStorage */
  const alternarSerie = useCallback((idxEx, idxSerie) => {
    const chave = `${idxEx}_${idxSerie}`;
    setMarcados(anterior => {
      const proximo = { ...anterior, [chave]: !anterior[chave] };
      localStorage.setItem(gerarChaveStorage(perfil, `treino_${dia}`), JSON.stringify(proximo));
      return proximo;
    });
    setAnimacoes(anterior => ({ ...anterior, [chave]: true }));
    setTimeout(() => setAnimacoes(anterior => ({ ...anterior, [chave]: false })), 200);
  }, [perfil, dia]);

  // Exibe card especial para dias de cardio ou descanso
  if (!entrada.chave) {
    return (
      <div className="text-center py-12 fade-in">
        <div className="text-5xl mb-3">{entrada.tipo === "cardio" ? "🏃" : "😴"}</div>
        <div className="text-white font-semibold text-lg">{entrada.rotulo}</div>
        <div className="text-slate-400 text-sm mt-1">{entrada.foco}</div>
        {entrada.tipo === "cardio" && (
          <div className="mt-4 mx-auto max-w-xs bg-slate-800 rounded-xl p-4 text-left">
            <div className="text-green-400 font-semibold text-sm mb-2">📋 Protocolo do Dia</div>
            <div className="text-slate-300 text-sm">• Zona 2 — FC 120–140 bpm</div>
            <div className="text-slate-300 text-sm">• {entrada.foco}</div>
            <div className="text-slate-300 text-sm">• Ritmo confortável — consegue conversar</div>
          </div>
        )}
      </div>
    );
  }

  // Cálculo do progresso do treino
  const treinoAtual  = p.treinos[entrada.chave];
  const totalSeries  = treinoAtual.exercicios.reduce((acc, ex) => acc + ex.series, 0);
  const seriesFeiras = Object.values(marcados).filter(Boolean).length;
  const progresso    = totalSeries > 0 ? Math.round((seriesFeiras / totalSeries) * 100) : 0;

  // Circunferência do SVG para o indicador de progresso
  const RAIO   = 24;
  const CIRCUM = 2 * Math.PI * RAIO;

  return (
    <div className="fade-in space-y-4">
      {/* Cabeçalho com nome do treino e indicador circular de progresso */}
      <div className="flex items-center justify-between">
        <div>
          <div className={`text-sm font-bold ${cor.texto}`}>{treinoAtual.nome}</div>
          <div className="text-slate-400 text-xs">{seriesFeiras}/{totalSeries} séries concluídas</div>
        </div>
        <div className={`relative w-14 h-14 ring-2 ${cor.anel} rounded-full flex items-center justify-center`}>
          <svg className="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 56 56">
            {/* Trilha do círculo (fundo cinza) */}
            <circle cx="28" cy="28" r={RAIO} stroke="#1e293b" strokeWidth="4" fill="none"/>
            {/* Arco de progresso preenchido */}
            <circle
              cx="28" cy="28" r={RAIO}
              stroke={cor.hex}
              strokeWidth="4"
              fill="none"
              strokeDasharray={`${CIRCUM}`}
              strokeDashoffset={`${CIRCUM * (1 - progresso / 100)}`}
              strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 0.3s" }}
            />
          </svg>
          <span className="text-xs font-bold text-white z-10">{progresso}%</span>
        </div>
      </div>

      {/* Lista de exercícios */}
      {treinoAtual.exercicios.map((ex, idxEx) => {
        const seriesExercicio  = Array.from({ length: ex.series }, (_, i) => marcados[`${idxEx}_${i}`]).filter(Boolean).length;
        const exercicioConcluido = seriesExercicio === ex.series;
        return (
          <div
            key={idxEx}
            className={`rounded-xl border transition-all duration-200 ${exercicioConcluido ? "border-green-600/50 bg-green-950/20" : "border-slate-700 bg-slate-800/50"}`}
          >
            <div className="p-3 pb-2">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className={`font-semibold text-sm ${exercicioConcluido ? "text-green-400" : "text-white"}`}>
                    {exercicioConcluido ? "✅ " : ""}{ex.nome}
                  </div>
                  <div className="text-slate-400 text-xs mt-0.5">{ex.equipamento}</div>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-xs text-slate-300 font-medium">{ex.repeticoes} reps</div>
                  <div className="text-xs text-slate-500">⏱ {ex.pausa}</div>
                </div>
              </div>
              <div className="mt-2 text-xs text-slate-500 italic">💡 {ex.dica}</div>
            </div>
            {/* Botões para marcar cada série individualmente */}
            <div className="px-3 pb-3">
              <div className="text-xs text-slate-500 mb-1.5">Marcar séries:</div>
              <div className="flex gap-2 flex-wrap">
                {Array.from({ length: ex.series }, (_, idxSerie) => {
                  const chave  = `${idxEx}_${idxSerie}`;
                  const feito  = !!marcados[chave];
                  return (
                    <button
                      key={idxSerie}
                      onClick={() => alternarSerie(idxEx, idxSerie)}
                      className={`w-9 h-9 rounded-lg text-sm font-bold transition-all duration-150 border ${
                        feito
                          ? `${cor.fundo} border-transparent text-white ${animacoes[chave] ? "check-pop" : ""}`
                          : "border-slate-600 bg-slate-700/50 text-slate-400 hover:border-slate-400"
                      }`}
                    >
                      {feito ? "✓" : idxSerie + 1}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })}

      {/* Mensagem de conclusão quando todos as séries forem marcadas */}
      {progresso === 100 && (
        <div className="text-center py-6 rounded-xl border border-green-500/40 bg-green-950/20">
          <div className="text-4xl mb-2">🎯</div>
          <div className="text-green-400 font-bold">Treino Concluído!</div>
          <div className="text-slate-400 text-sm mt-1">Excelente trabalho hoje 💪</div>
        </div>
      )}
    </div>
  );
}

// ===== Componente Habit Tracker =====
function HabitTracker({ perfil }) {
  const p = DADOS[perfil];
  const [habits, setHabits] = useState({});
  const cor = CORES_PERFIL[perfil];
  
  const HABIT_CONFIG = [
    { key: "treino", label: "🏋️ Treino realizado", meta: "4-5x/sem", type: "check" },
    { key: "cardio", label: "🏃 Cardio realizado", meta: "2x/sem", type: "check" },
    { key: "sono", label: "😴 Qualidade do sono (1-10)", meta: "≥ 7", type: "number", max: 10 },
    { key: "disposicao", label: "⚡ Disposição pré-treino (1-10)", meta: "≥ 7", type: "number", max: 10 },
    { key: "estresse", label: "😌 Nível de estresse (1-10)", meta: "≤ 4", type: "number", max: 10 },
    { key: "dieta", label: "🥗 Aderência à dieta (%)", meta: "≥ 90%", type: "number", max: 100 },
  ];

  useEffect(() => {
    const saved = localStorage.getItem(gerarChaveStorage(perfil, "habits"));
    setHabits(saved ? JSON.parse(saved) : {});
  }, [perfil]);

  const getWeekDates = () => {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
    
    return Array.from({length: 7}, (_, i) => {
      const date = new Date(monday);
      date.setDate(monday.getDate() + i);
      return date.toISOString().split('T')[0];
    });
  };

  const weekDates = getWeekDates();
  const today = new Date().toISOString().split('T')[0];

  const toggleHabit = (habitKey, date) => {
    setHabits(prev => {
      const key = `${date}_${habitKey}`;
      const next = { ...prev, [key]: !prev[key] };
      localStorage.setItem(gerarChaveStorage(perfil, "habits"), JSON.stringify(next));
      return next;
    });
  };

  const setHabitValue = (habitKey, date, value) => {
    setHabits(prev => {
      const key = `${date}_${habitKey}`;
      const next = { ...prev, [key]: value };
      localStorage.setItem(gerarChaveStorage(perfil, "habits"), JSON.stringify(next));
      return next;
    });
  };

  const getStreak = (habitKey) => {
    let streak = 0;
    const sortedDates = weekDates.slice().reverse();
    for (const date of sortedDates) {
      const key = `${date}_${habitKey}`;
      if (habits[key]) streak++;
      else break;
    }
    return streak;
  };

  return (
    <div className="fade-in space-y-4">
      <div className={`rounded-xl border p-4 ${cor.destaque}`}>
        <div className="text-xs text-slate-400 mb-2">📅 Semana atual</div>
        <div className="grid grid-cols-7 gap-1 text-center text-xs mb-1">
          {["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].map((day, i) => (
            <div key={i} className={weekDates[i]===today?"text-green-400 font-bold":"text-slate-500"}>{day}</div>
          ))}
        </div>
      </div>

      {HABIT_CONFIG.map(habit => {
        const streak = getStreak(habit.key);
        return (
          <div key={habit.key} className="rounded-xl border border-slate-700 bg-slate-800/50 p-3">
            <div className="flex items-center justify-between mb-3">
              <div className="flex-1">
                <div className="text-sm font-semibold text-white">{habit.label}</div>
                <div className="text-xs text-slate-500">Meta: {habit.meta}</div>
              </div>
              {streak > 0 && (
                <div className={`flex items-center gap-1 px-2 py-1 rounded-lg ${cor.fundo}/20 border ${cor.borda}`}>
                  <span className="text-lg">🔥</span>
                  <span className={`text-sm font-bold ${cor.texto}`}>{streak}d</span>
                </div>
              )}
            </div>
            <div className="grid grid-cols-7 gap-2">
              {weekDates.map((date, i) => {
                const key = `${date}_${habit.key}`;
                const value = habits[key];
                const isToday = date === today;
                
                if (habit.type === "number") {
                  return (
                    <input
                      key={i}
                      type="number"
                      min="0"
                      max={habit.max}
                      value={value || ""}
                      onChange={(e) => setHabitValue(habit.key, date, e.target.value)}
                      className={`w-full h-10 text-center text-sm font-bold rounded-lg border ${isToday?"ring-2 ring-green-400":""} ${value?`${cor.fundo} border-transparent text-white`:"border-slate-600 bg-slate-700/50 text-slate-400"}`}
                      placeholder="-"
                    />
                  );
                }
                
                return (
                  <button
                    key={i}
                    onClick={() => toggleHabit(habit.key, date)}
                    className={`h-10 rounded-lg border transition-all ${isToday?"ring-2 ring-green-400":""} ${value?`${cor.fundo} border-transparent text-white`:"border-slate-600 bg-slate-700/50 text-slate-400 hover:border-slate-400"}`}
                  >
                    {value ? "✓" : ""}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
// ─── Componente Principal: App ────────────────────────────────────────────────
function App() {
  // Perfil ativo: "fabio" ou "thais"
  const [perfilAtivo, setPerfilAtivo] = useState("fabio");

  // Dia da semana selecionado (padrão: hoje)
  const [diaSel, setDiaSel] = useState(obterDiaHoje);

  // Aba ativa: treino | dieta | suplementos | alertas
  const [abaAtiva, setAbaAtiva] = useState("treino");

  const p   = DADOS[perfilAtivo];
  const cor = CORES_PERFIL[perfilAtivo];
  
  // Funções de Export/Import de dados
  const exportData = () => {
    const allData = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('perf_')) {
        allData[key] = localStorage.getItem(key);
      }
    }
    const dataStr = JSON.stringify(allData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `performance_backup_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        Object.keys(data).forEach(key => {
          localStorage.setItem(key, data[key]);
        });
        alert('✅ Dados importados com sucesso! Recarregue a página.');
        window.location.reload();
      } catch (err) {
        alert('❌ Erro ao importar arquivo. Verifique o formato.');
      }
    };
    reader.readAsText(file);
  };

// Determina se o dia selecionado é de treino ou descanso
const tipoDia = p.rotina[diaSel].tipo === "treino" ? "treino" : "descanso";
  // Determina se o dia selecionado é de treino ou descanso (para a aba de dieta)
  const tipoDia = p.rotina[diaSel].tipo === "treino" ? "treino" : "descanso";

  // Abas de navegação inferiores
  const abas = [
    { id: "treino",       icone: "🏋️", rotulo: "Treino"       },
    { id: "dieta",        icone: "🥗", rotulo: "Dieta"        },
    { id: "suplementos",  icone: "💊", rotulo: "Suplementos"  },
    { id: "habitos",      icone: "📊", rotulo: "Hábitos"      },
    { id: "alertas",      icone: "⚠️", rotulo: "Alertas"      },
  ];

  return (
    <div className="min-h-screen bg-slate-900 flex flex-col max-w-md mx-auto">
      {<div className="sticky top-0 z-10 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 px-4 pt-4 pb-3 space-y-3">
  
  {/* Botões de Export/Import */}
  <div className="flex items-center justify-end gap-2">
    <button onClick={exportData} className="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-xs font-medium text-white transition-all">
      ⬇️ Exportar
    </button>
    abel className="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-xs font-medium text-white transition-all cursor-pointer">
      ⬆️ Importar
      <input type="file" accept=".json" onChange={importData} className="hidden" />
    </label>
  </div>
  
  <AlternadorPerfil ativo={perfilAtivo} aoMudar={setPerfilAtivo} />}
      <div className="sticky top-0 z-10 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 px-4 pt-4 pb-3 space-y-3">
        
        <AlternadorPerfil ativo={perfilAtivo} aoMudar={setPerfilAtivo} />

        {/* Estatísticas do perfil */}
        <div className="grid grid-cols-4 gap-2">
          {Object.entries(p.estatisticas).map(([chave, valor]) => (
            <CardEstatistica
              key={chave}
              rotulo={chave === "bf" ? "% Gordura" : chave === "meta" ? "Meta" : chave.charAt(0).toUpperCase() + chave.slice(1)}
              valor={valor}
              cor={perfilAtivo}
            />
          ))}
        </div>

        {/* Seletor de dia da semana */}
        <SeletorDia perfil={perfilAtivo} diaSelecionado={diaSel} aoSelecionar={setDiaSel} />

        {/* Abas de navegação */}
        <div className="flex gap-1 bg-slate-800 rounded-xl p-1">
          {abas.map(aba => (
            <button
              key={aba.id}
              onClick={() => setAbaAtiva(aba.id)}
              className={`flex-1 flex flex-col items-center py-1.5 rounded-lg text-xs font-medium transition-all duration-150 ${
                abaAtiva === aba.id ? `${cor.fundo} text-white` : "text-slate-400 hover:text-slate-200"
              }`}
            >
              <span>{aba.icone}</span>
              <span className="mt-0.5">{aba.rotulo}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Conteúdo principal */}
      <div className="flex-1 overflow-y-auto px-4 py-4 pb-6">
        {abaAtiva === "treino"      && <LogTreino           perfil={perfilAtivo} dia={diaSel} />}
        {abaAtiva === "dieta"       && <VisualizacaoDieta   perfil={perfilAtivo} tipoDia={tipoDia} />}
        {abaAtiva === "suplementos" && <VisualizacaoSupl    perfil={perfilAtivo} />}
        {abaAtiva === "habitos" && <HabitTracker perfil={perfilAtivo} />}
        {abaAtiva === "alertas"     && <VisualizacaoAlertas perfil={perfilAtivo} />}
      </div>
    </div>
  );
}

// ─── Inicialização da aplicação ───────────────────────────────────────────────
const raiz = ReactDOM.createRoot(document.getElementById("root"));
raiz.render(<App />);
</script>
</body>
</html>
